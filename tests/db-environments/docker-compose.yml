services:
  postgres:
    image: postgres:16
    container_name: yeapf2-test-postgres
    environment:
      POSTGRES_DB: yeapf2_test
      POSTGRES_USER: yeapf2
      POSTGRES_PASSWORD: yeapf2
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeapf2 -d yeapf2_test"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    container_name: yeapf2-test-mysql
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: yeapf2_test
      MYSQL_USER: yeapf2
      MYSQL_PASSWORD: yeapf2
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  pgdata:
  mysqldata:
